schema_version: 1
# SPAR tools registry
# Used to record tool presence and versions.
# Contract fields are machine-readable; comments are guidance only.
# Procedure: check all tools, auto-install missing when permitted, re-check attempted installs, then persist results.
# checked_at: UTC RFC 3339 timestamp of the latest completed check pass.
checked_at: "2026-04-21T04:39:27.495Z"

# Core tools are expected in all environments used with spar-kit.
core_cli:
  - name: git
    purpose: version control
    check: "git --version"
    installed: true
    version: "2.53.0.windows.3"

  - name: just
    purpose: task runner (see repo justfile)
    check: "just --version"
    installed: true
    version: "1.48.1"

  - name: npm
    purpose: Node package manager (required for spar-kit install path)
    check: "npm --version"
    installed: true
    version: "10.9.3"

forge_cli:
  # Check all forge CLIs; recommend installing only for the forge that matches the repo host (typically one).
  github:
    - name: gh
      target: github
      purpose: GitHub CLI (issues, PRs, Actions)
      check: "gh --version"
      installed: true
      version: "2.89.0"

  gitlab:
    - name: glab
      target: gitlab
      purpose: GitLab CLI (issues, MRs, pipelines)
      check: "glab version"
      installed: false
      reason: "not applicable: repository remote is GitHub; glab is for GitLab"

  bitbucket:
    - name: bb
      target: bitbucket
      purpose: Bitbucket CLI
      check: "bb --version"
      installed: false
      reason: "not applicable: repository remote is GitHub; bb is for Bitbucket"

installers:
  # OS/package-manager and ecosystem installers. Check every listed tool; use OS and repo context only for install recommendations, not to skip checks.
  windows:
    - name: winget
      target: windows
      purpose: install and update packages on Windows
      check: "winget --version"
      installed: true
      version: "1.28.220"

  macos:
    - name: brew
      target: macos
      purpose: Homebrew — install CLI tools on macOS
      check: "brew --version"
      installed: false
      reason: "not applicable: Homebrew targets macOS; this environment is Windows"

  python:
    - name: uv
      target: python
      purpose: fast Python package and env manager
      check: "uv --version"
      when: "repo uses Python tooling"
      installed: false
      reason: "not applicable: when condition — repo does not use Python tooling"
