<svg xmlns="http://www.w3.org/2000/svg" width="980" height="240" viewBox="0 0 980 240" role="img" aria-labelledby="title desc">
  <title id="title">SPAR workflow diagram</title>
  <desc id="desc">A four-step flow: Specify, Plan, Act, and Retain.</desc>
  <defs>
    <style>
      .label { font: 600 22px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .sub { font: 400 14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #9ca3af; stroke-width: 3; fill: none; marker-end: url(#head); }
      .box { fill: #f9fafb; stroke: #d1d5db; stroke-width: 2; rx: 12; }
    </style>
    <marker id="head" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#9ca3af" />
    </marker>
  </defs>

  <rect x="20" y="30" width="220" height="120" class="box" />
  <text x="130" y="78" text-anchor="middle" class="label">Specify</text>
  <text x="130" y="104" text-anchor="middle" class="sub">Define change intent</text>

  <rect x="260" y="30" width="220" height="120" class="box" />
  <text x="370" y="78" text-anchor="middle" class="label">Plan</text>
  <text x="370" y="104" text-anchor="middle" class="sub">Create ordered tasks</text>

  <rect x="500" y="30" width="220" height="120" class="box" />
  <text x="610" y="78" text-anchor="middle" class="label">Act</text>
  <text x="610" y="104" text-anchor="middle" class="sub">Build and validate</text>

  <rect x="740" y="30" width="220" height="120" class="box" />
  <text x="850" y="78" text-anchor="middle" class="label">Retain</text>
  <text x="850" y="104" text-anchor="middle" class="sub">Archive and document</text>

  <path d="M240 90 L260 90" class="arrow" />
  <path d="M480 90 L500 90" class="arrow" />
  <path d="M720 90 L740 90" class="arrow" />
</svg>
